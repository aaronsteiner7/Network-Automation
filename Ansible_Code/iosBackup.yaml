---
- name: Backup Fibre Channel Switch
  hosts: IOS
  gather_facts: no

  vars:
    # Directory where config backups will be saved to
    output_dir: "./backups/IOS"
    # Formatted name of the config file
    target_file: "{{ output_dir }}/{{ ansible_net_hostname }}-{{ now(utc=true,fmt='%Y%m%d') }}-backup.txt"

  tasks:
    - name: Check output directory
      file:
        path: "{{ output_dir }}"
        state: directory
      delegate_to: localhost

    - name: Get raw host config
      ansible.builtin.raw: 'show running-config'
      register: raw_output

    - name: Save config to local directory
      copy:
        content: "{{ raw_output.stdout }}"
        dest: "{{ target_file }}"
      delegate_to: localhost

    - name: Filter config content to remove text above 'version' string
      command:"sed -n /^version/,$p {{ target_file }}"
      register: filtered_config
      delegate_to: localhost

    - name: Overwrite existing content with filtered file
      copy:
        content: "{{ filtered_config.stdout }}"
        dest: "{{ target_file }}"
      delegate_to: localhost

